server:
  port: 8080 # Puerto estándar de Spring Boot

spring:
  application:
    name: sia-app-web # Nombre de la aplicación
  datasource:
    driver-class-name: org.postgresql.Driver # Controlador de la base de datos
    url: jdbc:postgresql://0.0.0.0:5432/dbhistorialactivos # URL de la base de datos
    username: usuario_soporte # Nombre de usuario de la base de datos
    password: 2024 # Contraseña de la base de datos
  jpa:
    hibernate:
      ddl-auto: update # Actualizar la base de datos
    database: postgresql # Tipo de base de datos
    database-platform: org.hibernate.dialect.PostgreSQLDialect # Plataforma de la base de datos
    show-sql: true # Mostrar SQL
    generate-ddl: true # Esta configuración indica a Hibernate que genere automáticamente el DDL (Data Definition Language) para las tablas de la base de datos.
logging:
  level:
    org:
      springframework:
        security: DEBUG